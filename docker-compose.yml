# MemeRAG — Dockerfile

version: '3.8'

services:

  # 1. Llama 3 engine — runs entirely on GCP
  ollama:
    image: ollama/ollama:latest
    container_name: memerag_ollama
    ports:
      - "11435:11435"
    volumes:
      - ollama_storage:/root/.ollama

  # 2. Vector database — stores 33,000 meme embeddings (Facebook + Twitter)
  # data/chromadb/ must be populated via ingest.py + ingest_twitter.py before running
  chromadb:
    image: chromadb/chroma:latest
    container_name: memerag_chroma
    ports:
      - "8000:8000"
    volumes:
      - ./data/chromadb:/data   # matches CHROMA_PATH in ingest.py

  # 3. Streamlit frontend — publicly accessible at GCP_IP:8501
  streamlit:
    build: .
    container_name: memerag_ui
    ports:
      - "8501:8501"
    volumes:
      - ./demo_images:/app/demo_images
      - ./data:/app/data
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11435
    depends_on:
      - ollama
      - chromadb

volumes:
  ollama_storage:
